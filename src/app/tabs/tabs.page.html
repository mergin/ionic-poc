<app-header [title]="titleKey() | translate" />

<ion-tabs (ionTabsDidChange)="onTabChange($event)">
  <ion-tab-bar slot="bottom">
    <ion-tab-button
      tab="tab1"
      href="/tabs/tab1"
    >
      <ion-icon
        aria-hidden="true"
        name="triangle"
      />
      <ion-label>{{ 'tabs.tab1' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button
      tab="tab2"
      href="/tabs/tab2"
    >
      <ion-icon
        aria-hidden="true"
        name="ellipse"
      />
      <ion-label>{{ 'tabs.tab2' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button
      tab="tab3"
      href="/tabs/tab3"
    >
      <ion-icon
        aria-hidden="true"
        name="square"
      />
      <ion-label>{{ 'tabs.tab3' | translate }}</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
