<ion-content [fullscreen]="true">
  <ion-refresher
    slot="fixed"
    (ionRefresh)="handleRefresh($event)"
  >
    <ion-refresher-content />
  </ion-refresher>

  @if (loading()) {
    <ion-item
      role="status"
      aria-live="polite"
    >
      <ion-label>{{ 'social.loading' | translate }}</ion-label>
    </ion-item>
  } @else if (errorMessageKey()) {
    <ion-item
      role="alert"
      aria-live="assertive"
    >
      <ion-label>{{ errorMessageKey()! | translate }}</ion-label>
    </ion-item>
  } @else {
    <ion-list
      role="list"
      [attr.aria-label]="'social.feedAriaLabel' | translate"
    >
      @for (post of posts(); track post.id) {
        <social-media-post
          [post]="post"
          (repostRequested)="repostPost($event)"
          (likeRequested)="likePost($event)"
        />
      }
    </ion-list>
  }
</ion-content>
