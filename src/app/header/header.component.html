<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="primary">
      <ion-button
        id="language-select-button"
        [attr.aria-label]="'common.languageSelector' | translate"
      >
        <ion-icon
          slot="icon-only"
          name="language"
        />
      </ion-button>

      <!-- language popover -->
      <ion-popover
        #popover
        trigger="language-select-button"
        triggerAction="click"
      >
        <ng-template>
          <ion-content class="ion-padding">
            <ion-list>
              <ion-item
                button
                detail="false"
                (click)="setLanguage('en')"
              >
                <ion-label>EN</ion-label>
              </ion-item>
              <ion-item
                button
                detail="false"
                lines="none"
                (click)="setLanguage('es')"
              >
                <ion-label>ES</ion-label>
              </ion-item>
            </ion-list>
          </ion-content>
        </ng-template>
      </ion-popover>
    </ion-buttons>
    <ion-title>{{ title() }}</ion-title>
  </ion-toolbar>
</ion-header>
