<ion-buttons
  slot="end"
  [attr.aria-label]="'common.languageSelector' | translate"
>
  <span class="language-label">
    {{ 'common.language' | translate }}
  </span>
  <ion-button
    fill="clear"
    size="small"
    [attr.aria-label]="'common.switchToEnglish' | translate"
    [attr.aria-pressed]="activeLang() === 'en'"
    [strong]="activeLang() === 'en'"
    (click)="setLanguage('en')"
  >
    EN
  </ion-button>
  <ion-button
    fill="clear"
    size="small"
    [attr.aria-label]="'common.switchToSpanish' | translate"
    [attr.aria-pressed]="activeLang() === 'es'"
    [strong]="activeLang() === 'es'"
    (click)="setLanguage('es')"
  >
    ES
  </ion-button>
</ion-buttons>
